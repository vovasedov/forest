<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Quest</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Netlify Functions starter</p>
          <h1>Grid Quest</h1>
          <p class="subtitle">
            Every free cell is reachable. A Beast starts at least 5 steps away and moves once after every player move.
          </p>
        </div>
      </header>

      <section class="panel controls-panel">
        <div class="control-group">
          <label for="sizeInput">Board size</label>
          <input id="sizeInput" type="number" min="2" max="50" value="10" />
        </div>
        <div class="control-group">
          <label for="wallInput">Wall count</label>
          <input id="wallInput" type="number" min="0" max="2400" value="40" />
        </div>
        <div class="control-group grow">
          <button id="newGameButton" class="button primary">Start new game</button>
        </div>
      </section>

      <section class="layout">
        <section class="panel board-panel">
          <div class="board-header">
            <h2>Board</h2>
            <div class="legend">
              <span><i class="legend-box empty"></i> Empty</span>
              <span><i class="legend-box wall"></i> Wall</span>
              <span><i class="legend-box visited"></i> Visited</span>
              <span><i class="legend-box player"></i> Player</span>
              <span><i class="legend-box beast"></i> Beast</span>
            </div>
          </div>
          <div id="grid" class="grid" aria-live="polite"></div>
        </section>

        <aside class="panel side-panel">
          <h2>Status</h2>
          <dl class="stats">
            <div>
              <dt>Turn</dt>
              <dd id="turnValue">-</dd>
            </div>
            <div>
              <dt>Player</dt>
              <dd id="positionValue">-</dd>
            </div>
            <div>
              <dt>Beast</dt>
              <dd id="beastPositionValue">-</dd>
            </div>
            <div>
              <dt>Beast distance</dt>
              <dd id="beastDistanceValue">-</dd>
            </div>
            <div>
              <dt>Visited cells</dt>
              <dd id="visitedValue">-</dd>
            </div>
            <div>
              <dt>Open moves</dt>
              <dd id="openMovesValue">-</dd>
            </div>
          </dl>

          <p id="message" class="message">Press “Start new game” to begin.</p>

          <div class="movement-grid">
            <div></div>
            <button id="moveForward" class="button">Forward</button>
            <div></div>
            <button id="moveLeft" class="button">Left</button>
            <button id="stayStill" class="button quiet" disabled>Move</button>
            <button id="moveRight" class="button">Right</button>
            <div></div>
            <button id="moveBackward" class="button">Backward</button>
            <div></div>
          </div>
        </aside>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
